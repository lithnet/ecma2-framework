pool:
  vmImage: 'windows-latest'

resources:
  repositories:
  - repository: release_tools
    type: git
    name: release-tools/release-tools
    ref: refs/heads/master

variables:
  - name: buildPlatform
    value: 'Any CPU'
  - name: buildConfiguration
    value: 'Release'
  - name: build.version.major
    value: 3
  - name: build.version.minor
    value: 0
  - name: build.version.revision
    value: $[counter(format('{0}.{1}', variables['build.version.major'], variables['build.version.minor']), 0)]
  - name: build.version.suffix
    value:
  - name: build.version
    value: $(build.version.major).$(build.version.minor).$(build.version.revision)$(build.version.suffix)
  - name: build.versionShort
    value: $(build.version.major).$(build.version.minor).$(build.version.revision)
  - name: build.date
    value: $[format('{0:yyyy}-{0:MM}-{0:dd}T{0:HH}:{0:mm}:{0:ss}', pipeline.startTime)]
  - name: azure.subscription
    value: 'ProductionServices'

name: $(build.version.major).$(build.version.minor).$(build.version.revision)$(build.version.suffix)
trigger: none

stages:
- stage: build_provider
  displayName: Build project
  dependsOn: []
  jobs:
    - job: "build_provider_job"
      displayName: Build project
      steps:
      - template: templates/checkout.yaml@release_tools

      - task: DotNetCoreCLI@2
        displayName: dotnet build
        inputs:
          command: build
          arguments: '-c $(buildConfiguration) -p:Version=$(build.version) -p:GeneratePackageOnBuild=false'
          # Build only the projects whose output the (nobuild:true) pack steps below consume - not the whole
          # solution (which also builds the example, test, and sample/consumer projects we never ship):
          #   * Sdk + Hosting     - each packs its own assembly; Hosting transitively builds Serialization
          #                         (bundled into Hosting.dll), and both transitively build the Sdk.
          #   * holding           - packs no assembly of its own, but pack still needs its build/restore assets;
          #                         its ProjectReferences cover Sdk + Hosting.
          #   * SourceGeneration  - the generator DLL the holding package bundles under build\tools\. It is
          #                         referenced as a loose <None> file from its bin output, NOT as a
          #                         ProjectReference, so it must be named explicitly or it is never built.
          # The shim + serialization sources the holding package ships are packed as .cs source, so those
          # projects need no build here.
          projects: |
            src/Lithnet.Ecma2Framework.Sdk/Lithnet.Ecma2Framework.Sdk.csproj
            src/Lithnet.Ecma2Framework.Hosting/Lithnet.Ecma2Framework.Hosting.csproj
            src/Lithnet.Ecma2Framework.SourceGeneration/Lithnet.Ecma2Framework.SourceGeneration.csproj
            src/Lithnet.Ecma2Framework/Lithnet.Ecma2Framework.csproj

      - template: templates/codesign.yaml@release_tools
        parameters:
          path:
          - $(Build.SourcesDirectory)/**/Lithnet.Ecma2Framework*.dll
          environment: 'prod'
          azureSubscription: $(azure.subscription)
          description: 'Lithnet ECMA2 Framework'

      # Pack ALL THREE packages: the contracts SDK (Lithnet.Ecma2Framework.Sdk), the host runtime
      # (Lithnet.Ecma2Framework.Hosting), and the consumer-facing holding package (Lithnet.Ecma2Framework). The
      # holding package declares >= dependencies on the Sdk and Hosting packages; the consumer installs the
      # holding package and NuGet resolves the matching Sdk (compile reference) + Hosting closure transitively.
      # All three are packed at the identical version (byEnvVar) and the >= ranges resolve lowest-applicable, so
      # the consumer always gets a matching Sdk + Hosting set - no exact pins, no version stamping.
      - task: DotNetCoreCLI@2
        displayName: dotnet pack (SDK)
        inputs:
          command: 'pack'
          packagesToPack: 'src/Lithnet.Ecma2Framework.Sdk/Lithnet.Ecma2Framework.Sdk.csproj'
          packDirectory: '$(Build.ArtifactStagingDirectory)\cp'
          nobuild: true
          versioningScheme: 'byEnvVar'
          versionEnvVar: 'build.version'

      - task: DotNetCoreCLI@2
        displayName: dotnet pack (Hosting)
        inputs:
          command: 'pack'
          packagesToPack: 'src/Lithnet.Ecma2Framework.Hosting/Lithnet.Ecma2Framework.Hosting.csproj'
          packDirectory: '$(Build.ArtifactStagingDirectory)\cp'
          nobuild: true
          versioningScheme: 'byEnvVar'
          versionEnvVar: 'build.version'

      - task: DotNetCoreCLI@2
        displayName: dotnet pack (holding)
        inputs:
          command: 'pack'
          packagesToPack: 'src/Lithnet.Ecma2Framework/Lithnet.Ecma2Framework.csproj'
          packDirectory: '$(Build.ArtifactStagingDirectory)\cp'
          nobuild: true
          versioningScheme: 'byEnvVar'
          versionEnvVar: 'build.version'

      - template: templates/codesign.yaml@release_tools
        parameters:
          path:
          - $(Build.ArtifactStagingDirectory)/cp/*.nupkg
          - $(Build.ArtifactStagingDirectory)/cp/*.snupkg
          environment: 'prod'
          azureSubscription: $(azure.subscription)
          description: 'Lithnet ECMA2 Framework'

      - template: templates/publish-nuget.yaml@release_tools
        parameters:
          nugetPackagePath: '$(Build.ArtifactStagingDirectory)/cp/*.nupkg'
          symbolPackagePath: '$(Build.ArtifactStagingDirectory)/cp/*.snupkg'
          publishInternal: true
          publishExternal: false

      - task: PublishPipelineArtifact@1
        displayName: Publish nuget artifact
        inputs:
          targetPath: '$(Build.ArtifactStagingDirectory)/cp'
          publishLocation: 'pipeline'
          artifact: cp

- stage: publish_nuget
  displayName: Publish to nuget.org
  dependsOn: "build_provider"
  jobs:
      - deployment: 'PublishPackages'
        environment: 'Public nuget feed'
        displayName: Publish packages to public nuget feed
        pool:
          vmImage: ubuntu-latest
        strategy:
          runOnce:
            deploy:
              steps:
              - checkout: none
              - download: current
                artifact: cp
              - template: templates/publish-nuget.yaml@release_tools
                parameters:
                  nugetPackagePath: '$(Pipeline.Workspace)/cp/*.nupkg'
                  publishInternal: false
                  publishExternal: true
                  externalFeedCredentials: 'MimManagementAgentsNuget'
